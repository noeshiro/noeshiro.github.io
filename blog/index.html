<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog - noeshiro</title>
  <meta name="description" content="ブログ・制作メモ" />
  <link rel="stylesheet" href="/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-R6W51L5MP1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-R6W51L5MP1');
  </script>
</head>
<body>
  <!-- Header（右上ハンバーガー） -->
  <header class="site-header">
    <button class="hamburger" id="menuBtn" aria-label="メニューを開く" aria-controls="navPanel" aria-expanded="false">
      <span class="bar top"></span>
      <span class="bar mid"></span>
      <span class="bar bot"></span>
    </button>
  </header>

  <!-- スライドメニュー -->
  <nav class="nav-overlay" id="navPanel" aria-hidden="true">
    <div class="nav-inner">
      <ul class="nav-menu">
        <li style="--i:0"><a href="/" class="nav-link">Top</a></li>
        <li style="--i:1"><a href="/about/" class="nav-link">About</a></li>
        <li style="--i:2"><a href="/blog/" class="nav-link">Blog</a></li>
        <li style="--i:3"><a href="/works/" class="nav-link">Works</a></li>
        <li style="--i:4"><a href="/contact/" class="nav-link">Contact</a></li>
      </ul>
    </div>
    <button class="nav-backdrop" aria-label="メニューを閉じる"></button>
  </nav>

  <main>
    <section class="page-header reveal">
      <h1 class="page-title">Blog</h1>
      <p class="page-description">ブログ・制作メモ</p>
    </section>

    <section class="blog-page-grid reveal" id="noteList">
      <div class="blog-loading">読み込み中...</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p class="footer-text">© 2025 noeshiro</p>
      <div class="footer-links">
        <a href="https://twitter.com/noeshiro" target="_blank" rel="noopener noreferrer">Twitter</a>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
  <script>
    (async function () {
      const container = document.getElementById('noteList');

      try {
        const res = await fetch('https://note.com/api/v2/creators/noeshiro/contents?kind=note&page=1');
        if (!res.ok) throw new Error('fetch failed');
        const json = await res.json();
        const items = json.data?.contents ?? [];

        if (items.length === 0) {
          container.innerHTML = '<p class="blog-empty">まだ記事がありません。</p>';
          return;
        }

        container.innerHTML = items.map(item => {
          const date = item.publishAt
            ? new Date(item.publishAt).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.')
            : '';
          const url = item.noteUrl ?? `https://note.com/noeshiro/n/${item.key}`;
          const title = item.name ?? '';
          const excerpt = item.body ? item.body.replace(/<[^>]*>/g, '').slice(0, 80) + '…' : '';

          return `
            <article class="blog-card">
              <a href="${url}" target="_blank" rel="noopener noreferrer" class="blog-card-link">
                <div class="blog-card-content">
                  <time class="blog-date">${date}</time>
                  <h3 class="blog-title">${title}</h3>
                  <p class="blog-excerpt">${excerpt}</p>
                </div>
              </a>
            </article>`;
        }).join('');

      } catch (e) {
        container.innerHTML = `<p class="blog-empty">記事の取得に失敗しました。<a href="https://note.com/noeshiro" target="_blank" rel="noopener noreferrer">note.com/noeshiro</a> からご覧ください。</p>`;
      }
    })();
  </script>
</body>
</html>
