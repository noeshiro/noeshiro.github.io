name: Fetch YouTube videos

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          CHANNEL_ID=$(curl -s "https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=noeshiro&key=${YOUTUBE_API_KEY}" | jq -r '.items[0].id')
          curl -s "https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&order=date&maxResults=12&key=${YOUTUBE_API_KEY}" \
            -o works/youtube.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add works/youtube.json
          git diff --staged --quiet || git commit -m "chore: update youtube.json"
          git push
