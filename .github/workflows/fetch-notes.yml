name: Fetch note.com articles

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch notes from note.com API
        run: |
          curl -s "https://note.com/api/v2/creators/noeshiro/contents?kind=note&page=1" \
            -H "User-Agent: Mozilla/5.0" \
            -o blog/notes.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/notes.json
          git diff --staged --quiet || git commit -m "chore: update notes.json"
          git push
