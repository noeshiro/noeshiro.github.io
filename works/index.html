<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Works - noeshiro</title>
  <meta name="description" content="のえしろの作品一覧" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta property="og:image" content="https://www.noeshiro.com/images/og.jpg" />
  <link rel="stylesheet" href="/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z8YSMGXTK0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z8YSMGXTK0');
  </script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <button class="hamburger" id="menuBtn" aria-label="メニューを開く" aria-controls="navPanel" aria-expanded="false">
      <span class="bar top"></span>
      <span class="bar mid"></span>
      <span class="bar bot"></span>
    </button>
  </header>

  <!-- スライドメニュー -->
  <nav class="nav-overlay" id="navPanel" aria-hidden="true">
    <div class="nav-inner">
      <ul class="nav-menu">
        <li style="--i:0"><a href="/" class="nav-link">Top</a></li>
        <li style="--i:1"><a href="/about/" class="nav-link">About</a></li>
        <li style="--i:2"><a href="/blog/" class="nav-link">Blog</a></li>
        <li style="--i:3"><a href="/works/" class="nav-link">Works</a></li>
        <li style="--i:4"><a href="/contact/" class="nav-link">Contact</a></li>
      </ul>
    </div>
    <button class="nav-backdrop" aria-label="メニューを閉じる"></button>
  </nav>

  <main>
    <section class="page-header reveal">
      <h1 class="page-title">Works</h1>
      <p class="page-description">制作した作品一覧</p>
    </section>

    <section class="works-section reveal">
      <div class="works-grid" id="worksPageList">
        <p style="color:var(--muted);font-size:.9rem;">読み込み中...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p class="footer-text">© 2026 noeshiro</p>
      <div class="footer-links">
        <a href="https://x.com/noeshiro" target="_blank" rel="noopener noreferrer">X</a>
        <a href="https://note.com/noeshiro" target="_blank" rel="noopener noreferrer">note</a>
        <a href="https://www.youtube.com/@noeshiro" target="_blank" rel="noopener noreferrer">YouTube</a>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
  <script>
    (async function () {
      const container = document.getElementById('worksPageList');

      try {
        const res = await fetch('/works/youtube.json');
        if (!res.ok) throw new Error('fetch failed');
        const json = await res.json();
        const items = json.items ?? [];

        if (items.length === 0) {
          container.innerHTML = '<p style="color:var(--muted);font-size:.9rem;">動画がありません。</p>';
          return;
        }

        container.innerHTML = items.map(item => {
          const videoId = item.id?.videoId ?? '';
          const snippet = item.snippet ?? {};
          const title = snippet.title ?? '';
          const thumb = snippet.thumbnails?.medium?.url ?? snippet.thumbnails?.default?.url ?? '';
          const date = snippet.publishedAt
            ? new Date(snippet.publishedAt).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.')
            : '';
          const url = `https://www.youtube.com/watch?v=${videoId}`;

          return `
            <article class="blog-card">
              <a href="${url}" target="_blank" rel="noopener noreferrer" class="blog-card-link">
                ${thumb ? `<img src="${thumb}" alt="${title}" style="width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:4px;" loading="lazy" />` : ''}
                <div class="blog-card-content">
                  <time class="blog-date">${date}</time>
                  <h3 class="blog-title">${title}</h3>
                </div>
              </a>
            </article>`;
        }).join('');

      } catch (e) {
        container.innerHTML = '<p style="color:var(--muted);font-size:.9rem;">動画の取得に失敗しました。<a href="https://www.youtube.com/@noeshiro" target="_blank" rel="noopener noreferrer">YouTubeチャンネル</a>からご覧ください。</p>';
      }
    })();
  </script>
</body>
</html>
