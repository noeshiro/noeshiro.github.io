<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact - noeshiro</title>
  <meta name="description" content="お問い合わせ" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta property="og:image" content="https://www.noeshiro.com/images/og.jpg" />
  <link rel="stylesheet" href="/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-R6W51L5MP1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-R6W51L5MP1');
  </script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <button class="hamburger" id="menuBtn" aria-label="メニューを開く" aria-controls="navPanel" aria-expanded="false">
      <span class="bar top"></span>
      <span class="bar mid"></span>
      <span class="bar bot"></span>
    </button>
  </header>

  <!-- スライドメニュー -->
  <nav class="nav-overlay" id="navPanel" aria-hidden="true">
    <div class="nav-inner">
      <ul class="nav-menu">
        <li style="--i:0"><a href="/" class="nav-link">Top</a></li>
        <li style="--i:1"><a href="/about/" class="nav-link">About</a></li>
        <li style="--i:2"><a href="/blog/" class="nav-link">Blog</a></li>
        <li style="--i:3"><a href="/works/" class="nav-link">Works</a></li>
        <li style="--i:4"><a href="/contact/" class="nav-link">Contact</a></li>
      </ul>
    </div>
    <button class="nav-backdrop" aria-label="メニューを閉じる"></button>
  </nav>

  <main>
    <section class="page-header reveal">
      <h1 class="page-title">Contact</h1>
      <p class="page-description">現在、お問い合わせは受け付けておりません</p>
    </section>

    <section class="reveal" style="max-width:600px;margin:0 auto;padding:0 var(--spacing-md) var(--spacing-xl);">
      <form onsubmit="return false;">
        <div style="margin-bottom:var(--spacing-md);">
          <label style="display:block;font-size:.875rem;color:var(--muted);margin-bottom:6px;">お名前</label>
          <input type="text" disabled placeholder="現在受付停止中"
            style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--muted);font-size:1rem;cursor:not-allowed;box-sizing:border-box;">
        </div>
        <div style="margin-bottom:var(--spacing-md);">
          <label style="display:block;font-size:.875rem;color:var(--muted);margin-bottom:6px;">メールアドレス</label>
          <input type="email" disabled placeholder="現在受付停止中"
            style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--muted);font-size:1rem;cursor:not-allowed;box-sizing:border-box;">
        </div>
        <div style="margin-bottom:var(--spacing-md);">
          <label style="display:block;font-size:.875rem;color:var(--muted);margin-bottom:6px;">メッセージ</label>
          <textarea disabled placeholder="現在受付停止中" rows="6"
            style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--muted);font-size:1rem;cursor:not-allowed;resize:none;box-sizing:border-box;"></textarea>
        </div>
        <button type="submit" disabled
          style="width:100%;padding:14px;background:var(--border);color:var(--muted);border:none;border-radius:var(--radius-sm);font-size:1rem;cursor:not-allowed;">
          送信（現在停止中）
        </button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p class="footer-text">© 2025 noeshiro</p>
      <div class="footer-links">
        <a href="https://x.com/noeshiro" target="_blank" rel="noopener noreferrer">X</a>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
