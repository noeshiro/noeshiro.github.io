<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <meta name="description" content="のえしろのポートフォリオ＆制作メモ" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta property="og:image" content="https://www.noeshiro.com/images/og.jpg" />
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z8YSMGXTK0"></script>

<body>
  <!-- Header（右上ハンバーガー） -->
  <header class="site-header">
    <button class="hamburger" id="menuBtn" aria-label="メニューを開く" aria-controls="navPanel" aria-expanded="false">
      <span class="bar top"></span>
      <span class="bar mid"></span>
      <span class="bar bot"></span>
    </button>
  </header>
  
  <!-- スライドメニュー -->
  <nav class="nav-overlay" id="navPanel" aria-hidden="true">
    <div class="nav-inner">
      <ul class="nav-menu">
        <li style="--i:0"><a href="/" class="nav-link">Top</a></li>
        <li style="--i:1"><a href="/about/" class="nav-link">About</a></li>
        <li style="--i:2"><a href="/blog/" class="nav-link">Blog</a></li>
        <li style="--i:3"><a href="/works/" class="nav-link">Works</a></li>
        <li style="--i:4"><a href="/contact/" class="nav-link">Contact</a></li>
      </ul>
    </div>
    <button class="nav-backdrop" aria-label="メニューを閉じる"></button>
  </nav>
  
  <main>
    <!-- Hero -->
    <section class="hero reveal">
      <div class="hero-content">
        <h1 class="hero-title">noeshiro</h1>
        <p class="hero-sub">制作メモ＆備忘録</p>
      </div>
    </section>
    
    <!-- About -->
    <section class="about-section reveal" id="about">
      <div class="about-deck">
        <div class="deck">
          <img src="images/profile.jpg" alt="プロフィール画像" class="deck-img is-top">
        </div>
        <div class="deck-info">
          <h2 class="section-title">About</h2>
          <p class="section-description"><br>制作した作品や学んだことを記録していきます。</p>
          <a class="link-underline" href="/about/">もっと読む →</a>
        </div>
      </div>
    </section>
    
    <!-- Works -->
    <section class="works-section reveal" id="works">
      <div class="section-header">
        <h2 class="section-title">Works</h2>
        <a class="link-underline" href="/works/">すべて見る →</a>
      </div>
      <div class="works-grid" id="topWorksList">
        <p style="color:var(--muted);font-size:.9rem;">読み込み中...</p>
      </div>
    </section>

    <!-- Blog -->
    <section class="blog-section reveal" id="blog">
      <div class="section-header">
        <h2 class="section-title">Blog</h2>
        <a class="link-underline" href="/blog/">すべて見る →</a>
      </div>
      <div class="blog-grid" id="topBlogList">
        <p style="color:var(--muted);font-size:.9rem;">読み込み中...</p>
      </div>
    </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p class="footer-text">© 2026 noeshiro</p>
      <div class="footer-links">
        <a href="https://x.com/noeshiro" target="_blank" rel="noopener noreferrer">X</a>
        <a href="https://note.com/noeshiro" target="_blank" rel="noopener noreferrer">note</a>
        <a href="https://www.youtube.com/@noeshiro" target="_blank" rel="noopener noreferrer">YouTube</a>
      </div>
    </div>
